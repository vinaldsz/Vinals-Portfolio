  <body>
    <div id="root">
      <!-- Instant paint: shown before JS loads, replaced by React on mount -->
      <div id="app-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:hsl(211 76% 8%)">
        <div style="width:42px;height:42px;border-radius:50%;border:3px solid hsl(182 100% 50% / 0.2);border-top-color:hsl(182 100% 50%);animation:app-spin 0.8s linear infinite"></div>
      </div>
      <style>
        @keyframes app-spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { #app-loader div { animation: none !important; } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
